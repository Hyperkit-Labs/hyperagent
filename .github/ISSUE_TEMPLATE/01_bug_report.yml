name: Bug report
description: Report unexpected behavior or a regression
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Search existing issues before filing. Thanks.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps, actual vs expected.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, commit or version if known.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets.
    validations:
      required: false
