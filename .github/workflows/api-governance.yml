name: Contract Governance

on:
  push:
    branches: [main, development]
  workflow_call:

permissions:
  contents: read

jobs:
  contract-artifacts:
    name: "contract:artifacts-diff"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies for contract export
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orchestrator/requirements.txt
          pip install -r services/roma-service/requirements.txt
          pip install jsonschema

      - name: Generate OpenAPI + spec contract mirrors
        run: pnpm run contracts:generate

      - name: Check generated artifacts are committed
        run: pnpm run contracts:artifacts:check

  contract-schema-registry-validate:
    name: "contract:schema-registry-validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install schema validation dependency
        run: pip install jsonschema

      - name: Validate schema registry
        run: python3 scripts/schema/validate_registry.py

  contract-openapi-lint:
    name: "contract:openapi-lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint OpenAPI with Redocly
        run: pnpm run openapi:lint

  contract-schemathesis-public-smoke:
    name: "contract:schemathesis-public-smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install orchestrator + Schemathesis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orchestrator/requirements.txt
          pip install schemathesis

      - name: Run Schemathesis against in-process FastAPI app
        run: bash scripts/api/run_schemathesis.sh
