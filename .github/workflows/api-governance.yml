name: API Governance

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

permissions:
  contents: read

jobs:
  contract-artifacts:
    name: Contract Artifacts + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies for contract export
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orchestrator/requirements.txt
          pip install -r services/roma-service/requirements.txt
          pip install jsonschema

      - name: Generate OpenAPI + Spec contract mirrors
        run: pnpm run contracts:generate

      - name: Check generated artifacts are committed
        run: |
          git diff --exit-code -- \
            packages/api-contracts/openapi/openapi.json \
            packages/api-contracts/openapi/spec-lock.schema.json \
            packages/api-contracts/src/generated/schema.ts \
            packages/api-contracts/src/generated/spec-lock.schema.ts \
            packages/schema-registry/manifest.json \
            packages/schema-registry/spec-contracts/v1/spec-lock.schema.json \
            packages/schema-registry/fixtures/spec-contracts/spec-lock-valid.json

      - name: Validate schema registry
        run: pnpm run schema:validate

      - name: Lint OpenAPI with Redocly
        run: pnpm run openapi:lint

  schemathesis:
    name: Schemathesis Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install orchestrator + Schemathesis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orchestrator/requirements.txt
          pip install schemathesis

      - name: Run Schemathesis against in-process FastAPI app
        run: bash scripts/api/run_schemathesis.sh
