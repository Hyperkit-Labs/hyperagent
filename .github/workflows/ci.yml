# HyperAgent CI/CD Pipeline
name: HyperAgent CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  schedule:
    - cron: '0 2 * * *'  # Daily security scan

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================================
  # STAGE 1: CODE QUALITY & LINTING
  # ============================================================================
  
  spec-drift-check:
    name: '[*] Spec Drift Check (TS canonical)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Run spec drift check
        run: |
          test -f tools/scripts/spec/check_spec_drift.sh && bash tools/scripts/spec/check_spec_drift.sh || echo "Spec drift script not found, skipping"
        continue-on-error: true
  
  lint-and-format:
    name: '[*] Code Quality Checks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy bandit
      
      - name: Run Black formatter check
        run: black --check services/orchestrator/
        continue-on-error: true
      
      - name: Run isort import check
        run: isort --check-only services/orchestrator/
        continue-on-error: true
      
      - name: Run MyPy type checking
        run: mypy services/orchestrator/
        continue-on-error: true

  # ============================================================================
  # STAGE 2: SECURITY SCANNING
  # ============================================================================
  
  security-scan:
    name: '[*] Security Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Bandit security linter (orchestrator)
        run: |
          pip install bandit
          bandit -r services/orchestrator/ -f json -o bandit-report.json -x '*/data/*' || true
          bandit -r services/orchestrator/ -x '*/data/*' || true
      
      - name: Run Trivy vulnerability scanner (fail on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-audit:
    name: '[*] Dependency Audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: pnpm audit (Node)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (orchestrator)
        run: pip-audit -r services/orchestrator/requirements.txt --desc
        continue-on-error: true

  # ============================================================================
  # STAGE 3: UNIT TESTS
  # ============================================================================
  
  unit-tests:
    name: '[TEST] Unit Tests'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hyperagent_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e packages/execution-backend
          pip install -r services/orchestrator/requirements.txt
          pip install pytest pytest-asyncio
        env:
          ENVIRONMENT: test
      
      - name: Run orchestrator integration tests
        working-directory: services/orchestrator
        run: |
          pytest tests/ -v --ignore=tests/integration/docker/
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/hyperagent_test
          ENVIRONMENT: test

  # ============================================================================
  # STAGE 3.5: FRONTEND CODE QUALITY & TESTS
  # ============================================================================
  
  frontend-lint-and-format:
    name: '[*] Frontend Code Quality'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint
        run: pnpm --filter hyperagent-studio run lint
        continue-on-error: true
      
      - name: Check code formatting
        run: pnpm --filter hyperagent-studio run format 2>/dev/null || echo "Format check skipped"
        continue-on-error: true
  
  frontend-tests:
    name: '[TEST] Frontend Tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run unit tests
        run: pnpm --filter hyperagent-studio run test
        continue-on-error: true

  e2e-tests:
    name: '[TEST] E2E (Playwright)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Playwright browsers
        run: pnpm --filter hyperagent-studio exec playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: pnpm --filter hyperagent-studio run test:e2e
        continue-on-error: true

  # ============================================================================
  # STAGE 4: INTEGRATION TESTS
  # ============================================================================
  
  integration-tests:
    name: '[TEST] Integration Tests'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hyperagent_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e packages/execution-backend
          pip install -r services/orchestrator/requirements.txt
          pip install pytest pytest-asyncio
        env:
          ENVIRONMENT: test
      
      - name: Run integration tests
        working-directory: services/orchestrator
        run: |
          pytest tests/ -v --ignore=tests/integration/docker/
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/hyperagent_test
          ENVIRONMENT: test

  # Path-gated: blocks agent-runtime / simulation Docker builds if @hyperagent/ai-tools breaks.
  ai-tools-tenderly-contract:
    name: '[TEST] ai-tools Tenderly contract (path-gated)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            contract:
              - 'packages/core-types/**'
              - 'packages/ai-tools/**'
              - 'services/agent-runtime/**'
              - 'services/simulation/**'
              - 'infra/docker/Dockerfile.agent-runtime.monorepo'
              - 'turbo.json'
              - 'pnpm-lock.yaml'

      - name: Install pnpm
        if: steps.paths.outputs.contract == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        if: steps.paths.outputs.contract == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.paths.outputs.contract == 'true'
        run: pnpm install --frozen-lockfile

      - name: Turbo build + test @hyperagent/ai-tools
        if: steps.paths.outputs.contract == 'true'
        run: pnpm turbo run build test --filter=@hyperagent/ai-tools

      - name: Skip (unchanged paths)
        if: steps.paths.outputs.contract != 'true'
        run: echo "Skip ai-tools contract — no changes under core-types, ai-tools, agent-runtime, simulation, agent-runtime Dockerfile, turbo.json, or pnpm-lock.yaml."

  # ============================================================================
  # STAGE 5: BUILD DOCKER IMAGE
  # ============================================================================
  
  build-docker:
    name: '[BUILD] Docker Image'
    runs-on: ubuntu-latest
    needs: [lint-and-format, security-scan, unit-tests, frontend-lint-and-format, frontend-tests, ai-tools-tenderly-contract]
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./infra/docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
      
      - name: Run Trivy vulnerability scanner on Docker image
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        continue-on-error: true
      
      - name: Upload Trivy image scan results to GitHub Security
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-image-results.sarif'

  # ============================================================================
  # STAGE 6: DOCKER COMPOSE TEST
  # ============================================================================
  
  docker-compose-test:
    name: '[TEST] Docker Compose Integration'
    runs-on: ubuntu-latest
    needs: [build-docker]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create minimal .env for CI
        run: |
          # CI-only: minimal env for Docker smoke test. docker-compose.ci.yml sets api-gateway NODE_ENV=test
          # so Upstash REST is not required for gateway startup. Optional secrets: UPSTASH_REDIS_CI_REST_* for stricter smoke.
          cat > .env << EOF
          UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_CI_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_CI_REST_TOKEN }}
          REDIS_URL=${{ secrets.UPSTASH_REDIS_CI_URL }}
          SUPABASE_URL=https://ci-test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY=ci-test-key-do-not-use-in-production
          EOF
      
      - name: Start services with Docker Compose
        env:
          POSTGRES_PASSWORD: test_password_ci_12345
          JWT_SECRET_KEY: test_jwt_secret_key_ci_12345
        run: |
          docker compose --project-directory . -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.ci.yml up -d
          sleep 45
      
      - name: Wait for API gateway
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:4000/health; do sleep 5; done'
      
      - name: Test API health endpoint
        run: |
          curl -f http://localhost:4000/health || exit 1
      
      - name: Stop services
        if: always()
        run: |
          docker compose --project-directory . -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.ci.yml down -v

  # ============================================================================
  # STAGE 7: NOTIFICATIONS
  # ============================================================================
  
  notify:
    name: '[*] Notifications'
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-and-format, unit-tests, integration-tests, ai-tools-tenderly-contract, build-docker, docker-compose-test]
    
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.integration-tests.result }}" == "success" ] && \
             [ "${{ needs.ai-tools-tenderly-contract.result }}" == "success" ] && \
             [ "${{ needs.build-docker.result }}" == "success" ] && \
             [ "${{ needs.docker-compose-test.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
      
      - name: Print status
        run: |
          echo "Pipeline Status: ${{ steps.status.outputs.status }}"
          echo "Lint: ${{ needs.lint-and-format.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "ai-tools Tenderly contract: ${{ needs.ai-tools-tenderly-contract.result }}"
          echo "Docker Build: ${{ needs.build-docker.result }}"
          echo "Docker Compose: ${{ needs.docker-compose-test.result }}"

