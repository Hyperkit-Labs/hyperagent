# GitHub CodeQL: semantic analysis for JavaScript/TypeScript and Python.
# This workflow is kept as an on-demand advanced setup lane only.
# When GitHub repository-level default CodeQL setup is enabled, PR/push-triggered
# advanced workflows fail with:
# "CodeQL analyses from advanced configurations cannot be processed when the
# default setup is enabled."
name: CodeQL

on:
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
          - language: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
