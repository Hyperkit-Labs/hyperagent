# Docker integration tests: E2E verification when running via Docker Compose.
# See .kiro/specs/e2e-docker-integration-testing/ for design and requirements.
name: Docker Integration Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  docker-integration:
    name: Docker E2E Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install API test dependencies
        run: |
          cd apps/hyperagent-api
          python -m pip install --upgrade pip
          pip install -r requirements.txt httpx pytest pytest-asyncio

      - name: Run preservation and bug-condition tests (no Docker)
        run: |
          cd apps/hyperagent-api
          pytest tests/integration/docker/test_preservation.py tests/integration/docker/test_bug_condition_docker_verification.py -v --no-cov -m integration
        env:
          SKIP_DOCKER_INTEGRATION: "1"

      - name: Run Docker integration tests (fixture starts compose)
        run: |
          cd apps/hyperagent-api
          pytest tests/integration/docker/ -v -m "integration and slow" --no-cov
        env:
          SKIP_DOCKER_INTEGRATION: ""
