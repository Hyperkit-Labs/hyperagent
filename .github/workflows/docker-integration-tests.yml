# Docker integration tests: E2E verification when running via Docker Compose.
name: Docker Integration Tests

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

jobs:
  docker-integration:
    name: Docker E2E Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hyperagent_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install orchestrator test dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e packages/execution-backend
          pip install -r services/orchestrator/requirements.txt
          pip install httpx pytest pytest-asyncio
        env:
          ENVIRONMENT: test

      - name: Run orchestrator integration tests
        run: |
          cd services/orchestrator
          pytest tests/ -v --no-cov -x
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/hyperagent_test
          SKIP_DOCKER_INTEGRATION: "1"
