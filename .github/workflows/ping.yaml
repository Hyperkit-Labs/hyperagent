# Ping Render services to prevent sleep (free tier spins down after ~15 min inactivity).
# Pings all services from render.yaml. Override with PING_URLS secret (comma-separated) if needed.
name: Ping Render Services

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Curl
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URLs
        env:
          PING_URLS: ${{ secrets.PING_URLS }}
        run: |
          # Default: all Render services from render.yaml
          DEFAULT_URLS="https://hyperagent-api.onrender.com/health,https://hyperagent-agent-runtime.onrender.com/health,https://hyperagent-compile.onrender.com/health,https://hyperagent-audit.onrender.com/health,https://hyperagent-tools.onrender.com/health,https://hyperagent-roma.onrender.com/health,https://hyperagent-vectordb.onrender.com/health,https://hyperagent-gateway.onrender.com/health"
          urls="${PING_URLS:-$DEFAULT_URLS}"
          urls=$(echo "$urls" | tr ',' '\n' | tr -d ' ' | grep -v '^$')

          failed=0
          for url in $urls; do
            echo -n "Pinging $url ... "
            if curl -sf --max-time 30 -o /dev/null "$url"; then
              echo "OK"
            else
              echo "FAIL"
              failed=$((failed + 1))
            fi
          done

          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed URL(s) failed (Render cold start or transient error)"
          fi
