name: PR Gate

on:
  pull_request:
    branches: [development, main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  actions: write

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-artifacts-diff:
    name: "contract:artifacts-diff"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies for contract export
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orchestrator/requirements.txt
          pip install -r services/roma-service/requirements.txt
          pip install jsonschema

      - name: Generate OpenAPI + spec contract mirrors
        run: pnpm run contracts:generate

      - name: Check generated artifacts are committed
        run: pnpm run contracts:artifacts:check

  contract-schema-registry-validate:
    name: "contract:schema-registry-validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install schema validation dependency
        run: pip install jsonschema

      - name: Validate schema registry
        run: python3 scripts/schema/validate_registry.py

  contract-openapi-lint:
    name: "contract:openapi-lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint OpenAPI with Redocly
        run: pnpm run openapi:lint

  contract-schemathesis-public-smoke:
    name: "contract:schemathesis-public-smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install orchestrator + Schemathesis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orchestrator/requirements.txt
          pip install schemathesis

      - name: Run Schemathesis against in-process FastAPI app
        run: bash scripts/api/run_schemathesis.sh

  quality-python:
    name: "quality:python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: |
          pip install ruff "black==24.10.0" isort

      - name: Run ruff
        run: ruff check services/orchestrator/ --output-format=concise

      - name: Check black formatting
        run: black --check services/orchestrator/

      - name: Check import sorting
        run: isort --check-only --profile black services/orchestrator/

  quality-typescript:
    name: "quality:typescript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared workspace packages
        run: pnpm --filter @hyperagent/api-contracts run build

      - name: Run ESLint (hyperagent-studio)
        run: pnpm --filter hyperagent-studio run lint

      - name: Check TypeScript types (hyperagent-studio)
        run: pnpm --filter hyperagent-studio run typecheck

  db-migrations-verify:
    name: "db:migrations-verify"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hyperagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Apply Supabase migrations + RLS test users
        run: |
          pnpm db:apply-migrations
          pnpm db:ci-setup-rls-test-users
          pnpm db:verify-security
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hyperagent_test

  test-backend:
    name: "test:backend"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hyperagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e "packages/execution-backend[opensandbox]"
          pip install -r services/orchestrator/requirements.txt
          pip install pytest pytest-asyncio "psycopg[binary]>=3.1"
        env:
          ENVIRONMENT: test

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Apply Supabase migrations + RLS test users
        run: |
          pnpm db:apply-migrations
          pnpm db:ci-setup-rls-test-users
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hyperagent_test

      - name: Run pytest
        run: |
          cd services/orchestrator
          pytest tests/ -v --ignore=tests/integration/docker/ -x
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hyperagent_test
          ENVIRONMENT: test
          RLS_INTEGRATION_TESTS: "1"

  test-frontend:
    name: "test:frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (hyperagent-studio)
        run: pnpm --filter hyperagent-studio run test -- --watchAll=false

  build-gateway:
    name: "build:gateway"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend-middleware
        run: pnpm --filter @hyperagent/backend-middleware run build

      - name: Typecheck api-gateway
        run: pnpm --filter hyperagent-api-gateway exec tsc --noEmit

      - name: Build api-gateway
        run: pnpm --filter hyperagent-api-gateway run build

  ai-tools-tenderly-contract:
    name: "contract:ai-tools-tenderly-advisory"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            contract:
              - 'packages/core-types/**'
              - 'packages/ai-tools/**'
              - 'services/agent-runtime/**'
              - 'services/simulation/**'
              - 'infra/docker/Dockerfile.agent-runtime.monorepo'
              - 'turbo.json'
              - 'pnpm-lock.yaml'

      - name: Install pnpm
        if: steps.paths.outputs.contract == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node
        if: steps.paths.outputs.contract == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.paths.outputs.contract == 'true'
        run: pnpm install --frozen-lockfile

      - name: Turbo build + test @hyperagent/ai-tools
        if: steps.paths.outputs.contract == 'true'
        run: pnpm turbo run build test --filter=@hyperagent/ai-tools

      - name: Skip (unchanged paths)
        if: steps.paths.outputs.contract != 'true'
        run: echo "Skip ai-tools contract advisory check."

  test-contracts:
    name: "contract:evm-tests"
    runs-on: ubuntu-latest
    if: hashFiles('contracts/**') != ''
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check for Foundry
        id: foundry
        run: |
          if [ -f contracts/evm/foundry.toml ] || [ -f contracts/foundry.toml ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Foundry
        if: steps.foundry.outputs.found == 'true'
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Foundry tests
        if: steps.foundry.outputs.found == 'true'
        run: |
          cd contracts/evm 2>/dev/null || cd contracts
          forge test -vvv --gas-report

  security-scan:
    name: "security:advisory-scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Slither (Smart Contracts)
        if: hashFiles('contracts/**/*.sol') != ''
        uses: crytic/slither-action@v0.3.0
        continue-on-error: true
        with:
          target: contracts/
          slither-args: --filter-paths "lib|test" --exclude-dependencies
          fail-on: high

      - name: Run Trivy (Dependencies & IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Bandit (Python)
        run: |
          pip install bandit
          bandit -r services/orchestrator/ -f json -o bandit-report.json -x '*/data/*' || true
          bandit -r services/orchestrator/ -x '*/data/*' || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  pr-size-check:
    name: "advisory:pr-size"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          files_changed=$(git diff --name-only "origin/$BASE_REF...HEAD" | wc -l)
          lines_changed=$(git diff --shortstat "origin/$BASE_REF...HEAD" | awk '{print $4+$6}')

          echo "Files changed: $files_changed"
          echo "Lines changed: $lines_changed"

          if [ "$files_changed" -gt 50 ]; then
            echo "::warning::PR modifies $files_changed files. Consider breaking into smaller PRs."
          fi

          if [ "$lines_changed" -gt 1000 ]; then
            echo "::warning::PR changes $lines_changed lines. Consider breaking into smaller PRs."
          fi

  conventional-commits:
    name: "advisory:commit-messages"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          pip install gitlint
          git log --format=%B "origin/$BASE_REF..HEAD" | gitlint --config .gitlint 2>/dev/null || true
        continue-on-error: true

  build-docker:
    name: "build:docker-advisory"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile
          push: false
          tags: hyperagent-backend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.studio
          push: false
          tags: hyperagent-frontend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.example.test/api/v1
            NEXT_PUBLIC_THIRDWEB_CLIENT_ID=pr-validation-client-id
            NEXT_PUBLIC_ENV=staging
            NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=pr-validation-anon-key

  label-pr:
    name: "automation:label-pr"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
