name: PR Validation

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          pip install ruff black isort
      
      - name: Run ruff
        run: ruff check .
      
      - name: Check black formatting
        run: black --check .
      
      - name: Check import sorting
        run: isort --check-only .

  lint-typescript:
    name: Lint TypeScript/JavaScript
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'apps/web/') || contains(github.event.pull_request.changed_files, '.tsx') || contains(github.event.pull_request.changed_files, '.ts')
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      
      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
      
      - name: Run ESLint
        run: |
          cd apps/web
          npm run lint
      
      - name: Check TypeScript types
        run: |
          cd apps/web
          npm run type-check

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hyperagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run pytest
        run: |
          pytest \
            --cov=hyperagent \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=junit.xml \
            tests/
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hyperagent_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
      
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit.xml

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'apps/web/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      
      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
      
      - name: Run tests
        run: |
          cd apps/web
          npm test -- --coverage --watchAll=false
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./apps/web/coverage
          flags: frontend

  test-contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'contracts/')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
      
      - name: Run Foundry tests
        run: |
          cd contracts
          forge test -vvv --gas-report
      
      - name: Run coverage
        run: |
          cd contracts
          forge coverage --report lcov
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./contracts
          flags: contracts

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Slither (Smart Contracts)
        if: contains(github.event.pull_request.changed_files, 'contracts/')
        uses: crytic/slither-action@v0.3.0
        continue-on-error: true
        with:
          target: contracts/
          slither-args: --filter-paths "lib|test" --exclude-dependencies
          fail-on: high
      
      - name: Run Trivy (Dependencies & IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run Bandit (Python)
        run: |
          pip install bandit
          bandit -r hyperagent/ -f json -o bandit-report.json || true
      
      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check PR size
        run: |
          files_changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          lines_changed=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $4+$6}')
          
          echo "Files changed: $files_changed"
          echo "Lines changed: $lines_changed"
          
          if [ "$files_changed" -gt 50 ]; then
            echo "::warning::PR modifies $files_changed files. Consider breaking into smaller PRs."
          fi
          
          if [ "$lines_changed" -gt 1000 ]; then
            echo "::warning::PR changes $lines_changed lines. Consider breaking into smaller PRs."
          fi

  conventional-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check commit messages
        run: |
          pip install gitlint
          
          # Check all commits in this PR
          git log --format=%B origin/${{ github.base_ref }}..HEAD | \
            gitlint --config .gitlint || true

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: false
          tags: hyperagent-backend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: false
          tags: hyperagent-frontend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  label-pr:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  pr-comment-summary:
    name: PR Summary Comment
    runs-on: ubuntu-latest
    needs: [lint-python, test-backend, security-scan]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `## PR Validation Summary
            
            | Check | Status |
            |-------|--------|
            | Lint Python | ${{ needs.lint-python.result == 'success' && '✅' || '❌' }} |
            | Backend Tests | ${{ needs.test-backend.result == 'success' && '✅' || '❌' }} |
            | Security Scan | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |
            
            ${needs.test-backend.result !== 'success' ? '⚠️ **Backend tests failed. Please review the logs.**' : ''}
            ${needs.security-scan.result !== 'success' ? '⚠️ **Security scan found issues. Please address them.**' : ''}
            `;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });
