# Reusable: orchestrator unit/integration tests with Postgres service container.
on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      pytest-args:
        required: false
        type: string
        default: "tests/ -v --ignore=tests/integration/docker/"
    secrets:
      inherit:

jobs:
  test:
    name: Pytest orchestrator
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hyperagent_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e "packages/execution-backend[opensandbox]"
          pip install -r services/orchestrator/requirements.txt
          pip install pytest pytest-asyncio
        env:
          ENVIRONMENT: test

      - name: Run pytest
        working-directory: services/orchestrator
        run: pytest ${{ inputs.pytest-args }}
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/hyperagent_test
          ENVIRONMENT: test
          EIGENDA_ENABLED: "0"
          EIGENDA_PRIVATE_KEY: ""
