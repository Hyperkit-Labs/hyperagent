# Reusable: Trivy filesystem scan + SARIF upload (security tab).
on:
  workflow_call:
    inputs:
      scan-ref:
        required: false
        type: string
        default: "."
      severity:
        required: false
        type: string
        default: "CRITICAL,HIGH"
      exit-code:
        required: false
        type: string
        default: "0"

jobs:
  trivy:
    name: Trivy FS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.severity }}
          trivy-args: "--scanners vuln,secret,misconfig"
          exit-code: ${{ inputs.exit-code }}

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
