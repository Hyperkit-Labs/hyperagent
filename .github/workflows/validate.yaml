name: PR Format Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check for Spam PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prTitle = pr.title;
            const prBody = pr.body || '';
            const author = pr.user.login;

            const knownBots = ['dependabot[bot]', 'renovate[bot]', 'github-actions[bot]'];
            if (knownBots.includes(author)) {
              console.log(`Trusted bot author: ${author}, skipping spam check`);
              return;
            }

            const spamSignals = [];
            if (prTitle.length < 5) spamSignals.push('title too short');
            if (/^\d+$/.test(prTitle)) spamSignals.push('title is only numbers');
            if (/^[a-z]{1,3}$/.test(prTitle)) spamSignals.push('title is gibberish');
            if (prBody.length === 0 && !prTitle.startsWith('Merge')) spamSignals.push('empty body');
            if (/https?:\/\/(?!github\.com)/i.test(prBody) && prBody.length < 50) spamSignals.push('suspicious external link in short body');

            if (spamSignals.length >= 2) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `## PR flagged as potential spam\n\nSignals: ${spamSignals.join(', ')}.\n\nIf this is a legitimate contribution, a maintainer will reopen it.`
              });
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed'
              });
              core.setFailed('PR closed as potential spam');
              return;
            }

            console.log('PR passed spam check');

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check PR Title Format
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const prTitle = context.payload.pull_request.title;
            // Allow merge-style titles: "Merge X into Y"
            if (/^Merge\s+.+\s+into\s+.+$/i.test(prTitle)) {
              console.log('✅ PR title is merge format, skipping directory check');
              return;
            }
            const titleRegex = /^([\w\s,{}/.]+): .+/;
            if (!titleRegex.test(prTitle)) {
              core.setFailed(`PR title "${prTitle}" does not match required format: directory, ...: description (or Merge X into Y)`);
              return;
            }

            const match = prTitle.match(titleRegex);
            const dirPart = match[1];
            const directories = dirPart.split(',').map(d => d.trim());
            const missingDirs = [];
            for (const dir of directories) {
              const fullPath = path.join(process.env.GITHUB_WORKSPACE, dir);
              if (!fs.existsSync(fullPath)) {
                missingDirs.push(dir);
              }
            }
            
            if (missingDirs.length > 0) {
              core.setFailed(`The following directories in the PR title do not exist: ${missingDirs.join(', ')}`);
              return;
            }
            
            console.log('✅ PR title format is valid');

      - name: Check PR body has required template sections
        uses: actions/github-script@v7
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            if (/^Merge\s+.+\s+into\s+.+$/i.test(prTitle)) {
              console.log('✅ Merge PR, skipping body template check');
              return;
            }
            const body = context.payload.pull_request.body || '';
            const required = [
              { name: 'Context/Description', test: () => /##\s*(Context|Description|Context\s*\/\s*Description)/i.test(body) },
              { name: 'Type of change', test: () => /##\s*Type\s+of\s+change/i.test(body) },
              { name: 'Related issues / tickets (or Closes #)', test: () => /##\s*Related\s+issues|Closes\s+#|Related\s+to\s+#/i.test(body) },
              { name: 'Author checklist', test: () => /##\s*Author\s+checklist/i.test(body) }
            ];
            const missing = required.filter(r => !r.test());
            if (missing.length > 0) {
              core.setFailed(`PR body is missing required sections: ${missing.map(m => m.name).join(', ')}. See .github/template/PULL_REQUEST_TEMPLATE.md for the template.`);
              return;
            }
            console.log('✅ PR body contains required template sections');