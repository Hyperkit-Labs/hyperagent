# Base Configuration - Common settings for all environments
# These settings are shared across development, staging, and production

config_version: "1.0"

# Service definitions
services:
  backend:
    name: hyperagent-api
    protocol: http
    host: ${BACKEND_HOST:localhost}
    port: ${BACKEND_PORT:8000}
    base_path: /api/v1
    health_endpoint: /health
    timeout_ms: 30000
    retry:
      max_attempts: 3
      backoff_ms: 1000
    
  frontend:
    name: hyperagent-frontend
    protocol: http
    host: ${FRONTEND_HOST:localhost}
    port: ${FRONTEND_PORT:3000}
    base_path: ""
    
  orchestrator:
    name: hyperagent-orchestrator
    protocol: http
    host: ${ORCHESTRATOR_HOST:localhost}
    port: ${ORCHESTRATOR_PORT:4000}
    base_path: /api/v2
    health_endpoint: /healthz
    timeout_ms: 30000
    
  x402_verifier:
    name: x402-verifier
    protocol: http
    host: ${X402_HOST:localhost}
    port: ${X402_PORT:3002}
    base_path: ""
    timeout_ms: 10000
    
  mlflow:
    name: mlflow-tracking
    protocol: http
    host: ${MLFLOW_HOST:localhost}
    port: ${MLFLOW_PORT:5000}
    base_path: ""
    
  redis:
    name: redis-cache
    protocol: redis
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DB:0}
    password: ${REDIS_PASSWORD:}
    
  postgres:
    name: postgres-db
    protocol: postgresql
    host: ${POSTGRES_HOST:localhost}
    port: ${POSTGRES_PORT:5432}
    database: ${POSTGRES_DB:hyperagent}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

# Feature flags
features:
  x402_payments:
    enabled: ${X402_ENABLED:true}
    networks: ${X402_NETWORKS:*}
    
  eigenda_storage:
    enabled: ${EIGENDA_ENABLED:false}
    networks:
      - mantle_mainnet
    
  batch_deployment:
    enabled: true
    max_contracts_per_batch: 10
    
  ai_routing:
    enabled: true
    fallback_provider: gemini
    
  monitoring:
    prometheus: true
    mlflow: true
    custom_metrics: true
    
  websockets:
    enabled: true
    reconnect_attempts: 5
    reconnect_delay_ms: 1000

# Network configuration reference
# Actual network configs are in networks.yaml
networks_config_file: networks.yaml

# Deployment configuration reference
deployment_config_file: deployment.yaml

# X402 configuration reference
x402_config_file: x402.yaml

# LLM configuration reference
llm_config_file: llm.yaml

# Logging configuration
logging:
  level: ${LOG_LEVEL:INFO}
  format: json
  outputs:
    - console
    - file
  file_path: ${LOG_FILE:logs/hyperagent.log}

# Security
security:
  cors_origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4000}
  jwt_secret: ${JWT_SECRET:dev-secret-change-in-production}
  jwt_expiry_hours: 24

# Performance
performance:
  max_workers: ${MAX_WORKERS:4}
  request_timeout_seconds: 300
  max_concurrent_requests: 100
