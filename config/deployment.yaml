# config/deployment.yaml
# Smart contract deployment configuration
# Used by both Python backend and TS API

# Deployment strategies per network
strategies:
  # ERC-4337 Account Abstraction (user-signed, gasless)
  erc4337:
    enabled: true
    networks:
      - avalanche_fuji
      - avalanche_mainnet
      - mantle_testnet
      - mantle_mainnet
      - base_mainnet
      - base_sepolia
      - arbitrum_one
      - arbitrum_sepolia
      - optimism_mainnet
      - optimism_sepolia
    
    entrypoint_address: "0x0000000071727De22E5E9d8BAf0edAc6f37da032"  # EntryPoint v0.7
    paymaster_required: true
    
  # Server wallet (legacy, for networks without AA)
  server_wallet:
    enabled: true
    networks:
      - ethereum_mainnet
      - ethereum_sepolia
      - polygon_mainnet
      - polygon_amoy
      - bnb_mainnet
      - bnb_testnet
      - skale_chaos_testnet
      - filecoin_mainnet
      - filecoin_calibration
    
    max_gas_price_gwei: 100  # Prevent overspending
    
  # Thirdweb Engine (delegated deployment)
  thirdweb_engine:
    enabled: false  # Optional, requires THIRDWEB_ENGINE_URL
    networks: ["*"]  # All networks if enabled

# Gas settings per network
gas_settings:
  # Ethereum L1
  ethereum_mainnet:
    max_priority_fee_gwei: 2
    max_fee_gwei: 100
    gas_limit_multiplier: 1.2
    
  ethereum_sepolia:
    max_priority_fee_gwei: 2
    max_fee_gwei: 50
    gas_limit_multiplier: 1.2
    
  # Layer 2s (low gas)
  avalanche_fuji:
    max_priority_fee_gwei: 1
    max_fee_gwei: 30
    gas_limit_multiplier: 1.1
    
  avalanche_mainnet:
    max_priority_fee_gwei: 1
    max_fee_gwei: 30
    gas_limit_multiplier: 1.1
    
  mantle_testnet:
    max_priority_fee_gwei: 0.02
    max_fee_gwei: 0.1
    gas_limit_multiplier: 1.1
    
  mantle_mainnet:
    max_priority_fee_gwei: 0.02
    max_fee_gwei: 0.1
    gas_limit_multiplier: 1.1
    
  base_mainnet:
    max_priority_fee_gwei: 0.1
    max_fee_gwei: 1
    gas_limit_multiplier: 1.1
    
  arbitrum_one:
    max_priority_fee_gwei: 0.1
    max_fee_gwei: 1
    gas_limit_multiplier: 1.1
    
  optimism_mainnet:
    max_priority_fee_gwei: 0.1
    max_fee_gwei: 1
    gas_limit_multiplier: 1.1
    
  polygon_mainnet:
    max_priority_fee_gwei: 50
    max_fee_gwei: 200
    gas_limit_multiplier: 1.2
    
  bnb_mainnet:
    max_priority_fee_gwei: 1
    max_fee_gwei: 10
    gas_limit_multiplier: 1.1
    
  # Gasless chains
  skale_chaos_testnet:
    max_priority_fee_gwei: 0
    max_fee_gwei: 0
    gas_limit_multiplier: 1.0

# Retry policy for failed deployments
retry_policy:
  max_retries: 3
  initial_delay_seconds: 2
  backoff_multiplier: 2.0  # Exponential backoff
  max_delay_seconds: 30
  
  retry_on:
    - "insufficient_funds"
    - "nonce_too_low"
    - "replacement_underpriced"
    - "timeout"
    - "network_error"
    
  dont_retry_on:
    - "revert"
    - "invalid_contract"
    - "compilation_error"

# Contract verification settings
verification:
  auto_verify: true
  
  explorers:
    avalanche_fuji: "https://api-testnet.snowtrace.io/api"
    avalanche_mainnet: "https://api.snowtrace.io/api"
    mantle_testnet: "https://api-sepolia.mantlescan.xyz/api"
    mantle_mainnet: "https://api.mantlescan.xyz/api"
    ethereum_mainnet: "https://api.etherscan.io/api"
    ethereum_sepolia: "https://api-sepolia.etherscan.io/api"
    polygon_mainnet: "https://api.polygonscan.com/api"
    base_mainnet: "https://api.basescan.org/api"
    base_sepolia: "https://api-sepolia.basescan.org/api"
    arbitrum_one: "https://api.arbiscan.io/api"
    optimism_mainnet: "https://api-optimistic.etherscan.io/api"
    bnb_mainnet: "https://api.bscscan.com/api"
  
  retry_attempts: 3
  retry_delay_seconds: 10

# Deployment timeouts
timeouts:
  tx_broadcast_seconds: 30
  tx_confirmation_seconds: 300  # 5 minutes
  verification_seconds: 120     # 2 minutes
  total_deployment_seconds: 600 # 10 minutes max

# Multi-chain deployment
multi_chain:
  enabled: true
  parallel_deployments: true
  max_concurrent: 5
  
  # Deploy to multiple chains in sequence or parallel
  order_preference:
    - "avalanche_fuji"      # Deploy to testnet first
    - "mantle_testnet"      # Then other testnets
    - "base_sepolia"
    - "avalanche_mainnet"   # Then mainnets
    - "mantle_mainnet"
    - "base_mainnet"

# EigenDA integration (for data availability)
eigenda:
  enabled: true
  networks:
    - mantle_mainnet
  disperser_url: "https://disperser.eigenda.xyz"
  use_authenticated: false

# Deployment notifications
notifications:
  webhook:
    enabled: true
    on_success: true
    on_failure: true
    
  websocket:
    enabled: true
    
  email:
    enabled: false  # Requires email service integration

# Rate limiting
rate_limits:
  # Per wallet address
  per_wallet:
    deployments_per_hour: 10
    deployments_per_day: 50
    
  # Per network (global)
  per_network:
    deployments_per_hour: 100
    deployments_per_day: 1000
    
  # Bypass for whitelisted addresses
  whitelist: []

# Safety checks
safety_checks:
  # Require audit before mainnet deployment
  require_audit_for_mainnet: true
  
  # Minimum audit pass threshold
  min_audit_score: 0.7  # 70% pass rate
  
  # Block deployment if critical issues found
  block_on_critical: true
  
  # Require manual review for high-value contracts
  manual_review_threshold_usd: 10000

# Constructor argument handling
constructor_args:
  # Auto-fill common patterns
  auto_fill:
    enabled: true
    patterns:
      - name: "initialSupply"
        default: 1000000
        type: "uint256"
      - name: "decimals"
        default: 18
        type: "uint8"
      - name: "name"
        default: "MyToken"
        type: "string"
      - name: "symbol"
        default: "MTK"
        type: "string"

# Wallet configuration (public addresses only, NOT private keys)
wallets:
  # Merchant wallet for receiving x402 payments
  merchant:
    address: "0xa43b752b6e941263eb5a7e3b96e2e0dea1a586ff"
    description: "Receives x402 payments from workflow operations"
    networks: ["*"]  # All networks
  
  # Server wallet (public address for reference only)
  # Private key must be in .env as DEPLOYER_PRIVATE_KEY
  server_deployer:
    address: "0xa98107Fe1fEb5606B5163479e1b9B868234AdEE2"
    description: "Server wallet for contract deployment on networks without AA"
    networks:
      - ethereum_mainnet
      - ethereum_sepolia
      - polygon_mainnet
      - bnb_mainnet
      - bnb_testnet
  
  # ERC-4337 EntryPoint and Factory addresses
  erc4337:
    entrypoint: "0x0000000071727De22E5E9d8BAf0edAc6f37da032"
    factory: "0xa98107Fe1fEb5606B5163479e1b9B868234AdEE2"
    description: "ERC-4337 Account Abstraction contracts"

