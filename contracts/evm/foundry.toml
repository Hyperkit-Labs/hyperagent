[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test/foundry"
script = "script"
cache_path = "cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"

[profile.ci]
fuzz = { runs = 256 }

[fmt]
line_length = 100
bracket_spacing = true
