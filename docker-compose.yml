# docker-compose.yml - All-in-One Development Setup
# 
# This file runs everything in one command:
#   docker-compose up
#   make docker-up
#
# Services included:
#   - Backend (FastAPI on port 8000)
#   - Database (PostgreSQL on port 5432)
#   - Redis (on port 6379)
#   - MLflow (Experiment tracking on port 5000)
#   - x402 Verifier (on port 3002)
#   - Prometheus (on port 9090)
#
# NOTE: This Docker Compose setup is for LOCAL DEVELOPMENT ONLY
# For production deployment, use:
#   - Render: See render.yaml and GUIDE/SIMPLIFIED_SETUP.md
#   - VPS: See scripts/start_production.sh
#   - Direct Python: uvicorn hyperagent.api.main:app
#
# Production deployments should use:
#   - Supabase for database (cloud PostgreSQL)
#   - Direct Python execution (no Docker)
#   - Optional Redis Cloud (if needed for multiple instances)
#
# Note: version field is obsolete in Docker Compose v2+

services:
  # ============================================================================
  # MAIN APPLICATION (BACKEND)
  # ============================================================================
  
  hyperagent:
    image: hyperagent:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: hyperagent_app
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # Application
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
      
      # Database
      - DATABASE_URL=${DATABASE_URL:-postgresql://hyperagent_user:secure_password@postgres:5432/hyperagent_db}
      - SUPABASE_URL=${SUPABASE_URL:-}
      # Override Supabase database password in local Docker to force use of local Postgres
      # This prevents accidental connections to remote Supabase during development
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      
      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # LLM Providers
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      
      # IPFS/Pinata Storage
      - PINATA_JWT=${PINATA_JWT:-}
      - PINATA_API_KEY=${PINATA_API_KEY:-}
      - PINATA_API_SECRET=${PINATA_API_SECRET:-}
      - PINATA_TEAM_ID=${PINATA_TEAM_ID:-}
      - PINATA_COMMUNITY_ID=${PINATA_COMMUNITY_ID:-}
      - PINATA_TEMPLATE_ID=${PINATA_TEMPLATE_ID:-}
      
      # Network Configuration
      # Note: Network RPC URLs, chain IDs, explorers are configured in config/networks.yaml
      # Note: Token addresses (USDC, etc.) are configured in config/tokens.yaml
      
      # Thirdweb Configuration
      - THIRDWEB_CLIENT_ID=${THIRDWEB_CLIENT_ID:-}
      - THIRDWEB_SECRET_KEY=${THIRDWEB_SECRET_KEY:-}
      - THIRDWEB_SERVER_WALLET_ADDRESS=${THIRDWEB_SERVER_WALLET_ADDRESS:-0x0000000000000000000000000000000000000000}
      - THIRDWEB_SERVER_WALLET_PRIVATE_KEY=${THIRDWEB_SERVER_WALLET_PRIVATE_KEY:-}
      - MERCHANT_WALLET_ADDRESS=${MERCHANT_WALLET_ADDRESS:-}
      
      # x402 Configuration
      # Note: Pricing configuration (contract types, tiers) is in config/pricing.yaml
      - X402_ENABLED=${X402_ENABLED:-false}
      - X402_ENABLED_NETWORKS=${X402_ENABLED_NETWORKS:-avalanche_fuji,avalanche_mainnet}
      - X402_SERVICE_URL=http://x402-verifier:3001
      - X402_SERVICE_PORT=${X402_SERVICE_PORT:-3002}
      
      # Security & Wallet
      - PRIVATE_KEY=${PRIVATE_KEY:-}
      - PUBLIC_ADDRESS=${PUBLIC_ADDRESS:-}
      
      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=${API_WORKERS:-4}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      
      # RAG & Planning
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-hyperkit-docs}
      
      # Security & TEE
      - GUARDIAN_MODEL_URL=${GUARDIAN_MODEL_URL:-}
      - GUARDIAN_MODEL_API_KEY=${GUARDIAN_MODEL_API_KEY:-}
      - ATTESTATION_CONTRACT_ADDRESS=${ATTESTATION_CONTRACT_ADDRESS:-}
      
      # Monitoring & Analytics
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      - DUNE_API_KEY=${DUNE_API_KEY:-}
      - DUNE_TVL_QUERY_ETHEREUM=${DUNE_TVL_QUERY_ETHEREUM:-}
      - DUNE_TVL_QUERY_POLYGON=${DUNE_TVL_QUERY_POLYGON:-}
      - DUNE_TVL_QUERY_AVALANCHE=${DUNE_TVL_QUERY_AVALANCHE:-}
      - DUNE_TVL_QUERY_MANTLE=${DUNE_TVL_QUERY_MANTLE:-}
      - DUNE_GAS_SAVINGS_QUERY=${DUNE_GAS_SAVINGS_QUERY:-}
      - DUNE_REVENUE_QUERY=${DUNE_REVENUE_QUERY:-}
      - MORALIS_API_KEY=${MORALIS_API_KEY:-}
      - MORALIS_WEBHOOK_URL=${MORALIS_WEBHOOK_URL:-}
      
      # Feature Flags
      - ENABLE_WEBSOCKET=${ENABLE_WEBSOCKET:-true}
      - ENABLE_RATE_LIMITING=${ENABLE_RATE_LIMITING:-false}
      - ENABLE_AUTHENTICATION=${ENABLE_AUTHENTICATION:-false}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      
      # JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      
      # Workflow Settings
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_BACKOFF_BASE=${RETRY_BACKOFF_BASE:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      x402-verifier:
        condition: service_healthy
    volumes:
      # Development: mount source code for hot reload
      - ./hyperagent:/app/hyperagent:ro
      - ./logs:/app/logs
      - ./alembic:/app/alembic:ro
      # Mount YAML configuration files
      - ./config:/app/config:ro
    networks:
      - hyperagent_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  
  # ============================================================================
  # DATABASE (POSTGRESQL)
  # ============================================================================
  
  postgres:
    # Using pg15 to match existing database (was upgraded to pg16 but database needs migration)
    # TODO: Migrate database to pg16 or use pg_upgrade
    # For now, using pg15 to match existing data directory
    image: pgvector/pgvector:pg15
    container_name: hyperagent_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hyperagent_db}
      POSTGRES_USER: ${POSTGRES_USER:-hyperagent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize pgvector extension
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hyperagent_user} -d ${POSTGRES_DB:-hyperagent_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hyperagent_network
    restart: unless-stopped
  
  # ============================================================================
  # CACHE (REDIS)
  # ============================================================================
  
  redis:
    # Using latest 7.4-alpine with newest alpine base (3.23) for security patches
    # Note: Go stdlib vulnerabilities in Redis binary require upstream fixes
    image: redis:7.4-alpine
    container_name: hyperagent_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - hyperagent_network
    restart: unless-stopped

  # ============================================================================
  # MLFLOW (EXPERIMENT TRACKING)
  # ============================================================================
  
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: hyperagent_mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER:-hyperagent_user}:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/${POSTGRES_DB:-hyperagent_db}
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - hyperagent_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-hyperagent_user}:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/${POSTGRES_DB:-hyperagent_db}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

  # ============================================================================
  # MONITORING (PROMETHEUS)
  # ============================================================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: hyperagent_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - hyperagent_network
    depends_on:
      hyperagent:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================================
  # x402 VERIFICATION SERVICE (TYPESCRIPT)
  # ============================================================================
  
  x402-verifier:
    image: hyperagent-x402-verifier:latest
    build:
      context: .
      dockerfile: services/x402-verifier/Dockerfile
    container_name: hyperagent_x402_verifier
    ports:
      - "${X402_SERVICE_PORT:-3002}:3001"
    environment:
      - THIRDWEB_SECRET_KEY=${THIRDWEB_SECRET_KEY:-}
      - THIRDWEB_SERVER_WALLET_ADDRESS=${THIRDWEB_SERVER_WALLET_ADDRESS:-}
      - MERCHANT_WALLET_ADDRESS=${MERCHANT_WALLET_ADDRESS:-}
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - WAIT_UNTIL=${WAIT_UNTIL:-confirmed}
    networks:
      - hyperagent_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # TS ORCHESTRATOR API (TYPESCRIPT)
  # ============================================================================
  
  ts-orchestrator:
    image: hyperagent-ts-orchestrator:latest
    build:
      context: .
      dockerfile: ts/api/Dockerfile
    container_name: hyperagent_ts_orchestrator
    ports:
      - "${TS_API_PORT:-4000}:4000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=4000
      - HOST=0.0.0.0
      - PYTHON_BACKEND_URL=http://hyperagent:8000
      - X402_VERIFIER_URL=http://x402-verifier:3001
      - X402_ENABLED=${X402_ENABLED:-false}
      - MERCHANT_WALLET_ADDRESS=${MERCHANT_WALLET_ADDRESS:-}
      # Note: Pricing (contract types, workflow tiers) is in config/pricing.yaml
      # Note: Network RPC URLs and token addresses are in config/networks.yaml and config/tokens.yaml
      - DATABASE_URL=${DATABASE_URL:-postgresql://hyperagent_user:secure_password@postgres:5432/hyperagent_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    networks:
      - hyperagent_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hyperagent:
        condition: service_healthy
    volumes:
      # Mount YAML configuration files
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/healthz', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  hyperagent_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  mlflow_artifacts:

