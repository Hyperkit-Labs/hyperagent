# CI override: adds Redis, uses minimal env. Use with compose -f docker-compose.yml -f docker-compose.ci.yml
services:
  redis:
    image: redis:7-alpine
    container_name: hyperagent-redis-ci
    networks:
      - hyperagent
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  orchestrator:
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0

  api-gateway:
    depends_on:
      orchestrator:
        condition: service_healthy
