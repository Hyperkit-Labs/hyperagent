# CI smoke test overlay (no local Redis). Replaces api-gateway `environment` so NODE_ENV is not
# production; the gateway can start without Upstash REST. Real deploys use docker-compose.yml only.
services:
  api-gateway:
    environment:
      - NODE_ENV=test
      - PORT=4000
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - AGENT_RUNTIME_URL=http://agent-runtime:4001
      - STORAGE_SERVICE_URL=http://storage:4005
