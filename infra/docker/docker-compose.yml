# Production stack (repo root = --project-directory). VPS: add -f docker-compose.resource-limits.yml or `make up-contabo`.
# Coolify/scripts: infra/scripts/compose-vps-{build,up}.sh · swap: infra/scripts/vps-setup-swap.sh · details: infra/README.md

services:
  # --- Edge ---
  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api-gateway
    container_name: hyperagent-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - AGENT_RUNTIME_URL=http://agent-runtime:4001
      - STORAGE_SERVICE_URL=http://storage:4005
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://dd-agent:4318
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://dd-agent:4318/v1/metrics
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`api.hyperkitlabs.com`)"
      - "traefik.http.routers.api-gateway.entrypoints=https"
      - "traefik.http.routers.api-gateway.tls=true"
      - "traefik.http.routers.api-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-gateway-http.rule=Host(`api.hyperkitlabs.com`)"
      - "traefik.http.routers.api-gateway-http.entrypoints=http"
      - "traefik.http.routers.api-gateway-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=4000"
      # Forwarding timeouts: must exceed gateway PROXY_TIMEOUT_MS (120s) so
      # Traefik does not close the connection while the gateway waits for the
      # orchestrator.  Studio CONFIG_BOOTSTRAP_TIMEOUT_MS is 45s; the gateway
      # proxy is 120s; Traefik should wait at least as long as the gateway.
      - "traefik.http.services.api-gateway.loadbalancer.responseForwarding.flushInterval=100ms"
      - "traefik.http.serversTransports.gw-transport.forwardingTimeouts.dialTimeout=10s"
      - "traefik.http.serversTransports.gw-transport.forwardingTimeouts.responseHeaderTimeout=130s"
      - "traefik.http.services.api-gateway.loadbalancer.server.transport=gw-transport"
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - hyperagent
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Core ---
  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.orchestrator.monorepo
    container_name: hyperagent-orchestrator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
      - REGISTRIES_PATH=/app/services/orchestrator/registries
      - AGENT_RUNTIME_URL=http://agent-runtime:4001
      - COMPILE_SERVICE_URL=http://compile:8004
      - AUDIT_SERVICE_URL=http://audit:8001
      - SIMULATION_SERVICE_URL=http://simulation:8002
      - DEPLOY_SERVICE_URL=http://deploy:8003
      - STORAGE_SERVICE_URL=http://storage:4005
      - VECTORDB_URL=http://vectordb:8080
      - ROMA_URL=http://roma-service:8080
      - TOOLS_BASE_URL=http://hyperagent-tools:9000
      - DD_SERVICE=hyperagent-orchestrator
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
      - DD_TRACE_OPENAI_AGENTS_ENABLED=false
      - DD_TRACE_PROPAGATION_STYLE_EXTRACT=tracecontext,datadog
      - DD_LLMOBS_ENABLED=${DD_LLMOBS_ENABLED:-0}
      - DD_LLMOBS_ML_APP=${DD_LLMOBS_ML_APP:-hyperagent-orchestrator}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://dd-agent:4318
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://dd-agent:4318/v1/metrics
    volumes:
      - ./infra/registries:/app/services/orchestrator/registries:ro
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-orchestrator"
    command: ["ddtrace-run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      agent-runtime:
        condition: service_healthy
      simulation:
        condition: service_healthy
      deploy:
        condition: service_healthy
      storage:
        condition: service_healthy
      compile:
        condition: service_healthy
      audit:
        condition: service_healthy
      roma-service:
        condition: service_healthy
      vectordb:
        condition: service_healthy
    networks:
      - hyperagent

  agent-runtime:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.agent-runtime.monorepo
    container_name: hyperagent-agent-runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - AUDIT_SERVICE_URL=http://audit:8001
      - COMPILE_SERVICE_URL=http://compile:8004
      - CHAIN_REGISTRY_PATH=/app/registries/network/chains.yaml
      - SIMULATION_SERVICE_URL=http://simulation:8002
      - DEPLOY_SERVICE_URL=http://deploy:8003
      - STORAGE_SERVICE_URL=http://storage:4005
      - DD_SERVICE=hyperagent-agent-runtime
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
    volumes:
      - ./infra/registries:/app/registries:ro
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-agent-runtime"
    networks:
      - hyperagent
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --- Pipeline (workers) ---
  simulation:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.simulation
    container_name: hyperagent-simulation
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8002
      - DD_SERVICE=hyperagent-simulation
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
    volumes:
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-simulation"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hyperagent

  deploy:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.deploy
    container_name: hyperagent-deploy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8003
      - CHAIN_REGISTRY_PATH=/app/registries/network/chains.yaml
      - DD_SERVICE=hyperagent-deploy
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
    volumes:
      - ./infra/registries:/app/registries:ro
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-deploy"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hyperagent

  storage:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.storage
    container_name: hyperagent-storage
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=4005
      - DD_SERVICE=hyperagent-storage
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
    volumes:
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-storage"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hyperagent

  compile:
    build:
      context: services/compile
      dockerfile: ../../infra/docker/Dockerfile.compile.lite
    container_name: hyperagent-compile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DD_SERVICE=hyperagent-compile
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
      - DD_TRACE_OPENAI_AGENTS_ENABLED=false
      - DD_TRACE_PROPAGATION_STYLE_EXTRACT=tracecontext,datadog
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://dd-agent:4318
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://dd-agent:4318/v1/metrics
    volumes:
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-compile"
    command: ["ddtrace-run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8004"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  audit:
    build:
      context: services/audit
      dockerfile: ../../infra/docker/Dockerfile.audit
    container_name: hyperagent-audit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DD_SERVICE=hyperagent-audit
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
      - DD_TRACE_OPENAI_AGENTS_ENABLED=false
      - DD_TRACE_PROPAGATION_STYLE_EXTRACT=tracecontext,datadog
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://dd-agent:4318
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://dd-agent:4318/v1/metrics
    volumes:
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-audit"
    command: ["ddtrace-run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  hyperagent-tools:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.hyperagent-tools
    container_name: hyperagent-tools
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DD_SERVICE=hyperagent-tools
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
      - DD_TRACE_OPENAI_AGENTS_ENABLED=false
      - DD_TRACE_PROPAGATION_STYLE_EXTRACT=tracecontext,datadog
    volumes:
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-tools"
    command: ["ddtrace-run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "9000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  roma-service:
    build:
      context: services/roma-service
      dockerfile: ../../infra/docker/Dockerfile.roma
    container_name: hyperagent-roma
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_RUNTIME_URL=http://agent-runtime:4001
      - DD_SERVICE=hyperagent-roma
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
      - DD_TRACE_OPENAI_AGENTS_ENABLED=false
      - DD_TRACE_PROPAGATION_STYLE_EXTRACT=tracecontext,datadog
    volumes:
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-roma"
    command: ["ddtrace-run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      agent-runtime:
        condition: service_healthy
    networks:
      - hyperagent

  # --- Data (RAG) ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hyperagent-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hyperagent

  vectordb:
    build:
      context: services/vectordb
      dockerfile: ../../infra/docker/Dockerfile.vectordb
    container_name: hyperagent-vectordb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DD_SERVICE=hyperagent-vectordb
      - DD_ENV=${DD_ENV:-prod}
      - DD_TRACE_AGENT_URL=unix:///var/run/datadog/apm.socket
      - DD_DOGSTATSD_URL=unix:///var/run/datadog/dsd.socket
      - DD_TRACE_OPENAI_AGENTS_ENABLED=false
      - DD_TRACE_PROPAGATION_STYLE_EXTRACT=tracecontext,datadog
    volumes:
      - datadog-run:/var/run/datadog:ro
    labels:
      com.datadoghq.tags.env: "${DD_ENV:-prod}"
      com.datadoghq.tags.service: "hyperagent-vectordb"
    depends_on:
      - qdrant
    command: ["ddtrace-run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  # --- Sandbox ---
  sandbox-api:
    build:
      context: services/sandbox-docker
      dockerfile: Dockerfile
    container_name: hyperagent-sandbox
    restart: unless-stopped
    ports:
      - "127.0.0.1:8005:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-data:/var/lib/sandbox-docker
    env_file:
      - .env
    environment:
      - SANDBOX_WORK_DIR=/var/lib/sandbox-docker
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  # --- Observability ---
  dd-agent:
    image: registry.datadoghq.com/agent:7
    container_name: hyperagent-dd-agent
    restart: unless-stopped
    environment:
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_SITE=${DD_SITE:-us5.datadoghq.com}
      - DD_ENV=${DD_ENV:-prod}
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_APM_RECEIVER_SOCKET=/var/run/datadog/apm.socket
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_SOCKET=/var/run/datadog/dsd.socket
      - DD_APM_INSTRUMENTATION_ENABLED=docker
      - DD_APM_INSTRUMENTATION_LIBRARIES=${DD_APM_INSTRUMENTATION_LIBRARIES:-java:1,python:4,js:5,php:1,dotnet:3,ruby:2}
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_IGNORE_AUTOCONF=redisdb
      - DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT=0.0.0.0:4318
      - HOST_PROC=/proc
      - DD_CONTAINER_EXCLUDE=name:hyperagent-dd-agent
    ports:
      - "127.0.0.1:4318:4318"
    volumes:
      - datadog-run:/var/run/datadog
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - hyperagent

networks:
  hyperagent:
    driver: bridge

volumes:
  sandbox-data:
    name: hyperagent_sandbox-data
  qdrant_data:
    name: hyperagent_qdrant-data
  datadog-run:
    name: hyperagent_datadog-run
