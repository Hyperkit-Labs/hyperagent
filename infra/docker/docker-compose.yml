# Production stack for Contabo VPS (Coolify or manual deploy).
# Paths are relative to project directory (repo root). Coolify uses --project-directory.
#
# Run from repo root:
#   docker compose --project-directory . -f infra/docker/docker-compose.yml up -d
#
# Coolify:
#   - Base Directory: / (repo root)
#   - Compose path: infra/docker/docker-compose.yml
#   - Custom Build: docker compose -f infra/docker/docker-compose.yml build
#   - Custom Start: docker compose -f infra/docker/docker-compose.yml up -d
#   - Disable Git submodules and LFS in Advanced > Git (Coolify #4746)
#   - Set env vars in Shared Env
#
# External: Supabase (DB). Gateway: Upstash REST in .env. Orchestrator TCP: REDIS_URL (e.g. Upstash redis:// / rediss://).

services:
  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api-gateway
    container_name: hyperagent-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - AGENT_RUNTIME_URL=http://agent-runtime:4001
      - STORAGE_SERVICE_URL=http://storage:4005
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - hyperagent
    # Liveness only: full /health calls Supabase + orchestrator and can flap when upstreams are slow.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.orchestrator.monorepo
    container_name: hyperagent-orchestrator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REGISTRIES_PATH=/app/services/orchestrator/registries
      - AGENT_RUNTIME_URL=http://agent-runtime:4001
      - COMPILE_SERVICE_URL=http://compile:8004
      - AUDIT_SERVICE_URL=http://audit:8001
      - SIMULATION_SERVICE_URL=http://simulation:8002
      - DEPLOY_SERVICE_URL=http://deploy:8003
      - STORAGE_SERVICE_URL=http://storage:4005
      - VECTORDB_URL=http://vectordb:8080
      - ROMA_URL=http://roma-service:8080
      - TOOLS_BASE_URL=http://hyperagent-tools:9000
    volumes:
      - ./infra/registries:/app/services/orchestrator/registries:ro
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      agent-runtime:
        condition: service_healthy
      simulation:
        condition: service_healthy
      deploy:
        condition: service_healthy
      storage:
        condition: service_healthy
      compile:
        condition: service_healthy
      audit:
        condition: service_healthy
      roma-service:
        condition: service_healthy
      vectordb:
        condition: service_healthy
    networks:
      - hyperagent

  agent-runtime:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.agent-runtime.monorepo
    container_name: hyperagent-agent-runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - AUDIT_SERVICE_URL=http://audit:8001
      - COMPILE_SERVICE_URL=http://compile:8004
      - CHAIN_REGISTRY_PATH=/app/registries/network/chains.yaml
      - SIMULATION_SERVICE_URL=http://simulation:8002
      - DEPLOY_SERVICE_URL=http://deploy:8003
      - STORAGE_SERVICE_URL=http://storage:4005
    volumes:
      - ./infra/registries:/app/registries:ro
    networks:
      - hyperagent
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  simulation:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.simulation
    container_name: hyperagent-simulation
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8002
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hyperagent

  deploy:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.deploy
    container_name: hyperagent-deploy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8003
      - CHAIN_REGISTRY_PATH=/app/registries/network/chains.yaml
    volumes:
      - ./infra/registries:/app/registries:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hyperagent

  storage:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.storage
    container_name: hyperagent-storage
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=4005
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hyperagent

  compile:
    build:
      context: services/compile
      dockerfile: ../../infra/docker/Dockerfile.compile.lite
    container_name: hyperagent-compile
    restart: unless-stopped
    env_file:
      - .env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8004"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  audit:
    build:
      context: services/audit
      dockerfile: ../../infra/docker/Dockerfile.audit
    container_name: hyperagent-audit
    restart: unless-stopped
    env_file:
      - .env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  hyperagent-tools:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.hyperagent-tools
    container_name: hyperagent-tools
    restart: unless-stopped
    env_file:
      - .env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "9000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  roma-service:
    build:
      context: services/roma-service
      dockerfile: ../../infra/docker/Dockerfile.roma
    container_name: hyperagent-roma
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_RUNTIME_URL=http://agent-runtime:4001
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      agent-runtime:
        condition: service_healthy
    networks:
      - hyperagent

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hyperagent-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hyperagent

  vectordb:
    build:
      context: services/vectordb
      dockerfile: ../../infra/docker/Dockerfile.vectordb
    container_name: hyperagent-vectordb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

  sandbox-api:
    build:
      context: services/sandbox-docker
      dockerfile: Dockerfile
    container_name: hyperagent-sandbox
    restart: unless-stopped
    ports:
      # F-029: Bind to 127.0.0.1 only. Host access for admin/debug; internal calls use http://sandbox-api:8000.
      # Service validates OPENSANDBOX_API_KEY (Bearer) for all non-health requests.
      - "127.0.0.1:8005:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-data:/var/lib/sandbox-docker
    env_file:
      - .env
    environment:
      - SANDBOX_WORK_DIR=/var/lib/sandbox-docker
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hyperagent

networks:
  hyperagent:
    driver: bridge

volumes:
  sandbox-data:
    name: hyperagent_sandbox-data
  qdrant_data:
    name: hyperagent_qdrant-data
