# Full Nginx server block for Contabo VPS
# Use this when Nginx is the reverse proxy in front of your HyperAgent stack.
# Replace YOUR_DOMAIN, YOUR_CONTABO_IP, and paths as needed.
#
# Deployment:
#   1. Copy to /etc/nginx/sites-available/hyperagent
#   2. ln -s /etc/nginx/sites-available/hyperagent /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#
# If using Coolify + Traefik: Coolify manages the proxy. Use Traefik labels or
# Coolify's proxy settings instead. See CONNECTORS_ZERO_SLOP_REFERENCE.md.

server {
    listen 80;
    listen [::]:80;
    server_name api.YOUR_DOMAIN.com;

    # Redirect HTTP to HTTPS (when using Let's Encrypt)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.YOUR_DOMAIN.com;

    # SSL (Let's Encrypt or your certs)
    ssl_certificate /etc/letsencrypt/live/api.YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.YOUR_DOMAIN.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/hyperagent-api-access.log;
    error_log /var/log/nginx/hyperagent-api-error.log;

    # General API (standard timeouts)
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SSE streaming: 660s timeout to prevent disconnect during 10+ min agent runs
    # Without this, the real-time terminal drops during npm install / long builds.
    location /api/v1/streaming/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 660s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 660s;
        chunked_transfer_encoding off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
