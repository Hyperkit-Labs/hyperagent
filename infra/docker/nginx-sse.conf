# Nginx config fragment for Contabo VPS: long-lived SSE for agent discussion stream
# Standard proxy timeouts (60s) cause chat to disconnect during 10+ min agent runs.
# Include this in your server block or add to existing location /api/v1/streaming/
# ZSPS: proxy_buffering off and proxy_cache off are required so logs stream immediately.

location /api/v1/streaming/ {
    proxy_pass http://orchestrator:8000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 660s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 660s;
    chunked_transfer_encoding off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
