name: Quality Gates

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: apps/hyperagent-api
        run: |
          pip install -r requirements.txt
          pip install black isort mypy bandit pytest pytest-cov
      
      - name: Code formatting (Black)
        working-directory: apps/hyperagent-api
        run: black --check .
      
      - name: Import sorting (isort)
        working-directory: apps/hyperagent-api
        run: isort --check-only .
      
      - name: Type checking (mypy)
        working-directory: apps/hyperagent-api
        run: mypy hyperagent --ignore-missing-imports || true
      
      - name: Security scan (Bandit)
        working-directory: apps/hyperagent-api
        run: bandit -r hyperagent -f json -o bandit-report.json || true
      
      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: apps/hyperagent-api/bandit-report.json

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: apps/hyperagent-api
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests with coverage
        working-directory: apps/hyperagent-api
        run: |
          pytest --cov=hyperagent --cov-report=xml --cov-report=html --cov-fail-under=80
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          UPSTASH_REDIS_REST_URL: ""
          UPSTASH_REDIS_REST_TOKEN: ""
          REDIS_URL: ""
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: apps/hyperagent-api/coverage.xml
          flags: python
          fail_ci_if_error: false

  frontend-quality:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Lint
        run: pnpm turbo lint
      
      - name: Type check
        run: pnpm turbo typecheck
      
      - name: Test
        run: pnpm turbo test

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      
      - name: Run Snyk security scan (Node.js)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build all packages
        run: pnpm turbo build
      
      - name: Verify API builds
        working-directory: apps/hyperagent-api
        run: |
          python -m py_compile hyperagent/api/main.py
          python -c "import hyperagent; print('Import successful')"

  database-migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: apps/hyperagent-api
        run: |
          pip install -r requirements.txt
          pip install alembic psycopg2-binary
      
      - name: Check migrations
        working-directory: apps/hyperagent-api
        run: |
          alembic check
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [code-quality, test-coverage, frontend-quality, security-scan, build-verification, database-migration-check]
    if: always()
    steps:
      - name: Quality Gate Status
        run: |
          echo "## Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Coverage | ${{ needs.test-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Quality | ${{ needs.frontend-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Verification | ${{ needs.build-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Migrations | ${{ needs.database-migration-check.result }} |" >> $GITHUB_STEP_SUMMARY

