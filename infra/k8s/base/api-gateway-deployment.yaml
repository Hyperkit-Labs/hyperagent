apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: hyperagent
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: hyperagent-api-gateway:latest
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
          envFrom:
            - configMapRef:
                name: api-gateway-config
                optional: true
            - secretRef:
                name: api-gateway-secrets
                optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hyperagent
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      name: http
  selector:
    app: api-gateway
