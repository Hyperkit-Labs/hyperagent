apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hyperagent-production

resources:
  - ../../base

replicas:
  - name: hyperagent-api
    count: 5

patches:
  - path: env-vars.yaml
  - path: replicas-patch.yaml
  - path: hpa.yaml

configMapGenerator:
  - name: hyperagent-config
    behavior: merge
    literals:
      - LOG_LEVEL=WARNING
      - ENVIRONMENT=production

