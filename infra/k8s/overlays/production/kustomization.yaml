apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hyperagent-production
resources:
  - ../../base
patches:
  - path: namespace-patch.yaml
    target:
      kind: Namespace
      name: hyperagent
labels:
  - includeSelectors: true
    pairs:
      environment: production
replicas:
  - name: api-gateway
    count: 2
  - name: orchestrator
    count: 2
