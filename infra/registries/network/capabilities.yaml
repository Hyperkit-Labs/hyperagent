        tenderly: true
        x402: true
        erc8004: true
        verification: full
        accountAbstraction:
          erc4337: true
          eip7702: false
      defaults:
        framework: hardhat
        gasStrategy: cheap
        securityProfile: relaxed

    arbitrum-one:
      chainId: 42161
