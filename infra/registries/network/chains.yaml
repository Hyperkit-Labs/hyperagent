      enabled: true

      chainlist:
        name: BNB Smart Chain
        chainId: 56
        rpcUrls:
          - https://bsc-dataseed.bnbchain.org
        blockExplorerUrls:
          - https://bscscan.com
        nativeCurrency:
          name: BNB
          symbol: BNB
          decimals: 18
        faucets: []

      hyperagent:
        slug: bsc-mainnet
        category: L1
        tier: supported
        capabilities:
          tenderly: true
          accountAbstraction:
            erc4337: true
            eip7702: false
          x402: true
          verification: true
        defaults:
          framework: hardhat
          gasStrategy: standard
          securityProfile: medium
        notes:
          - "Heavily used retail chain; higher rug risk; adjust templates."

    # -------------------------------------------------------------------------
    # opBNB Mainnet
    # -------------------------------------------------------------------------
    - id: 204
      enabled: true

      chainlist:
        name: opBNB
        chainId: 204
        rpcUrls:
          - https://opbnb-mainnet-rpc.bnbchain.org
        blockExplorerUrls:
          - https://opbnbscan.com
        nativeCurrency:
          name: BNB
          symbol: BNB
          decimals: 18
        faucets: []

      hyperagent:
        slug: opbnb-mainnet
        category: L2
        tier: experimental
        capabilities:
          tenderly: false
          accountAbstraction:
            erc4337: true
            eip7702: false
          x402: true
          verification: true
        defaults:
          framework: hardhat
          gasStrategy: low
          securityProfile: medium
        notes:
          - "High throughput, very low fees; good for high-frequency flows."

    # -------------------------------------------------------------------------
    # Filecoin Mainnet (FEVM)
    # -------------------------------------------------------------------------
    - id: 314
      enabled: true

      chainlist:
        name: Filecoin
        chainId: 314
        rpcUrls:
          - https://api.node.glif.io/rpc/v1
        blockExplorerUrls:
          - https://filfox.info
        nativeCurrency:
          name: Filecoin
          symbol: FIL
          decimals: 18
        faucets: []

      hyperagent:
        slug: filecoin-mainnet
