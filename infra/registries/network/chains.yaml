          symbol: AVAX
          decimals: 18
        faucets: []

      hyperagent:
        slug: avalanche-c
        category: L1
        tier: supported
        capabilities:
          tenderly: true
          accountAbstraction:
            erc4337: true
            eip7702: false
          x402: true
          erc8004: true
          verification: true
        defaults:
          framework: hardhat
          gasStrategy: standard
          securityProfile: strict
        notes:
          - "Preferred for EVM L1 multi-chain deployments."

    # -------------------------------------------------------------------------
