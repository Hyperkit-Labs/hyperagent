          - https://api.avax-test.network/ext/bc/C/rpc
        blockExplorerUrls:
          - https://testnet.snowtrace.io
        nativeCurrency:
          name: Avalanche
          symbol: AVAX
          decimals: 18
        faucets:
          - https://faucet.avax.network/

      hyperagent:
        slug: avalanche-fuji
        category: testnet
        tier: primary
        capabilities:
          tenderly: true
          accountAbstraction:
            erc4337: true
            eip7702: false
          x402: true
          erc8004: true
          verification: true
        defaults:
          framework: hardhat
          gasStrategy: cheap
          securityProfile: relaxed
        notes:
          - "Avalanche testnet for closed beta."
          - "Use with Skale Base Sepolia as alternate testnet options."

    # -------------------------------------------------------------------------
    # Arbitrum One
    # -------------------------------------------------------------------------
    - id: 42161
      enabled: true

      chainlist:
        name: Arbitrum One
        chainId: 42161
        rpcUrls:
          - https://arb1.arbitrum.io/rpc
        blockExplorerUrls:
          - https://arbiscan.io
        nativeCurrency:
          name: Ether
          symbol: ETH
          decimals: 18
        faucets: []

      hyperagent:
        slug: arbitrum-one
        category: L2
        tier: supported
        capabilities:
          tenderly: true
          accountAbstraction:
            erc4337: true
            eip7702: false
          x402: true
          verification: true
