# infra/registries/network/chains.yaml
# HyperAgent Chain Registry (GitOps-managed)
# Fields under `chainlist:` are synced from Chainlist / ethereum-lists.
# Fields under `hyperagent:` are local extensions and MUST NOT be overwritten by sync.

apiVersion: hyperkitlabs.com/v1
kind: ChainRegistry
metadata:
  name: hyperagent-chains
  version: 1.0.0
spec:
  chains:
    # -------------------------------------------------------------------------
    # Ethereum Mainnet (reference / baseline)
    # -------------------------------------------------------------------------
    - id: 1
      enabled: true

      chainlist:
        name: Ethereum Mainnet
        chainId: 1
        rpcUrls:
          - https://ethereum.publicnode.com
        blockExplorerUrls:
          - https://etherscan.io
        nativeCurrency:
          name: Ether
          symbol: ETH
          decimals: 18
        faucets: []

      hyperagent:
        slug: ethereum-mainnet
        category: L1
        tier: canonical
        capabilities:
          tenderly: true
          accountAbstraction:
            erc4337: true
            eip7702: true
          x402: true
          verification: true
        defaults:
          framework: hardhat
          gasStrategy: standard
          securityProfile: strict
        notes:
          - "Use as reference chain for gas estimates and attack surface."

    # -------------------------------------------------------------------------
    # Base Mainnet
    # -------------------------------------------------------------------------
    - id: 8453
      enabled: true

      chainlist:
        name: Base
        chainId: 8453
        rpcUrls:
          - https://mainnet.base.org
        blockExplorerUrls:
          - https://basescan.org
        nativeCurrency:
          name: Ether
          symbol: ETH
          decimals: 18
        faucets: []

      hyperagent:
        slug: base-mainnet
        category: L2
        tier: primary
        capabilities:
          tenderly: true
          accountAbstraction:
            erc4337: true
            eip7702: true
          x402: true
          verification: true
        defaults:
          framework: hardhat
          gasStrategy: standard
          securityProfile: strict
        notes:
          - "Preferred L2 target for production deployments."
          - "High priority for x402 + AA templates."

    # -------------------------------------------------------------------------
    # SKALE Base Mainnet
    # -------------------------------------------------------------------------
    - id: 1187947933
      enabled: true

      chainlist:
        name: SKALE Base
        chainId: 1187947933
        rpcUrls:
          - https://skale-base.skalenodes.com/v1/base
          - wss://skale-base.skalenodes.com/v1/ws/base
        blockExplorerUrls:
          - https://skale-base-explorer.skalenodes.com/
        nativeCurrency:
          name: CREDIT
          symbol: CREDIT
          decimals: 18
        faucets: []  # SKALE uses portals / allocations, not public gas token faucets

      hyperagent:
        slug: skalebase-mainnet
        category: L2
        tier: preferred
        capabilities:
          tenderly: false
          accountAbstraction:
            erc4337: true
            eip7702: false
          x402: true
          erc8004: true
          verification: true
        defaults:
          framework: foundry
          gasStrategy: low
          securityProfile: strict
        notes:
          - "Gas abstraction via CREDIT; user gas is effectively free."
          - "Integrate SKALE Base docs for deployment helpers."

    # -------------------------------------------------------------------------
    # SKALE Base Sepolia Testnet
    # -------------------------------------------------------------------------
    - id: 324705682
      enabled: true

      chainlist:
        name: SKALE Base Sepolia
        chainId: 324705682
        rpcUrls:
          - https://base-sepolia-testnet.skalenodes.com/v1/jubilant-horrible-ancha
          - wss://base-sepolia-testnet.skalenodes.com/v1/ws/jubilant-horrible-ancha
        blockExplorerUrls:
          - https://base-sepolia-testnet-explorer.skalenodes.com/
        nativeCurrency:
          name: CREDIT
          symbol: CREDIT
          decimals: 18
        faucets:
          - https://base-sepolia-faucet.skale.space/

      hyperagent:
        slug: skalebase-sepolia
        category: testnet
        tier: primary
        capabilities:
          tenderly: false
          accountAbstraction:
            erc4337: true
            eip7702: false
          x402: true
          erc8004: true
          verification: true
        defaults:
          framework: foundry
          gasStrategy: cheap
          securityProfile: relaxed
        notes:
          - "Default testnet for SKALE Base pipelines."
          - "Use for closed beta deployments."

    # -------------------------------------------------------------------------
    # Mantle Mainnet
    # -------------------------------------------------------------------------
    - id: 5000
      enabled: true

      chainlist:
        name: Mantle
        chainId: 5000
        rpcUrls:
          - https://rpc.mantle.xyz
        blockExplorerUrls:
          - https://explorer.mantle.xyz
        nativeCurrency:
          name: Mantle
          symbol: MNT
          decimals: 18
        faucets: []

      hyperagent:
        slug: mantle-mainnet
        category: L2
        tier: preferred
        capabilities:
          tenderly: true
          accountAbstraction:
            erc4337: true
            eip7702: false
          x402: true
          verification: true
        defaults:
          framework: hardhat
          gasStrategy: low
          securityProfile: strict
        notes:
          - "Integrate Mantle-specific bridges and DA settings."

    # -------------------------------------------------------------------------
    # Avalanche C-Chain Mainnet
    # -------------------------------------------------------------------------
