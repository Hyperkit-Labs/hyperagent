# SDK capability registry (GitOps). Thirdweb, viem, Hardhat, Foundry: which chains they are
# blessed for and what features (ERC4337, EIP7702, x402) they provide.
apiVersion: hyperkitlabs.com/v1
kind: SdkRegistry
metadata:
  name: evm-sdks
  version: "1"
spec:
  sdks:
    - id: thirdweb
      name: Thirdweb SDK
      package: npm:@thirdweb/sdk
      capabilities:
        wallet: true
        erc4337: true
        eip7702: true
        x402: true
      supportedChains:
        - skale_base_mainnet
        - skale_base_sepolia_testnet
        - avalanche_fuji
    - id: viem
      name: viem
      package: npm:viem
      capabilities:
        wallet: true
        erc4337: false
        eip7702: false
        x402: false
      supportedChains:
        - skale_base_mainnet
        - skale_base_sepolia_testnet
        - avalanche_fuji
    - id: hardhat
      name: Hardhat
      package: npm:hardhat
      capabilities:
        compile: true
        test: true
        deploy: true
      supportedChains:
        - skale_base_mainnet
        - skale_base_sepolia_testnet
        - avalanche_fuji
    - id: foundry
      name: Foundry
      package: npm:foundry-rs/forge-std
      capabilities:
        compile: true
        test: true
        deploy: true
        fuzz: true
      supportedChains:
        - skale_base_mainnet
        - skale_base_sepolia_testnet
        - avalanche_fuji
