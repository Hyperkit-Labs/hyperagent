apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hyperagent-ingress
  labels:
    app: hyperagent
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.hyperagent.io
    secretName: hyperagent-tls
  rules:
  - host: api.hyperagent.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hyperagent-api
            port:
              number: 80

