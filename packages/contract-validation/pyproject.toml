[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hyperagent-contract-validation"
version = "0.1.0"
description = "Safe contract name and filename validation for compile/audit services"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest"]

[tool.hatch.build.targets.wheel]
packages = ["src/contract_validation"]
