[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "execution-backend"
version = "0.1.0"
description = "Execution backend abstraction for compile, audit, and exploit simulation (E2B primary, OpenSandbox fallback, local dev optional)"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "e2b>=2.0.0",
]
[project.optional-dependencies]
opensandbox = ["opensandbox-sdk>=0.3.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/execution_backend"]
