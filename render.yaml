# Render Blueprint. See docs/RENDER_FULL_STACK.md.
# Dashboard: https://dashboard.render.com/blueprint/new?repo=<REPO_HTTPS_URL>
# Blueprint Path: render.yaml (repo root). Link branch: main or feature/justinedevs.
#
# Architecture: Entire backend on Render. Production uses real services (no mocks).
# Set sync: false vars in Render Dashboard. A2A_* and REGISTRIES_PATH optional (defaults from erc8004.yaml).
#
services:
  - type: web
    name: hyperagent-api
    runtime: python
    plan: free
    buildCommand: cd services/orchestrator && pip install -r requirements.txt
    startCommand: cd services/orchestrator && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: THIRDWEB_CLIENT_ID
        sync: false
      - key: THIRDWEB_SECRET_KEY
        sync: false
      - key: THIRDWEB_SERVER_WALLET_ADDRESS
        sync: false
      - key: MERCHANT_WALLET_ADDRESS
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PASSWORD
        sync: false
      - key: X402_ENABLED
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: "production"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENABLE_METRICS
        value: "true"
      - key: ENABLE_WEBSOCKET
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      # ERC-8004 A2A identity: optional; when unset, uses infra/registries/erc8004/erc8004.yaml
      - key: A2A_DEFAULT_CHAIN_ID
        sync: false
      - key: A2A_AGENT_ID
        sync: false
      - key: REGISTRIES_PATH
        sync: false
      - key: AGENT_RUNTIME_URL
        sync: false
      - key: ROMA_URL
        sync: false
      - key: SIMULATION_SERVICE_URL
        sync: false
      - key: DEPLOY_SERVICE_URL
        sync: false
      - key: STORAGE_SERVICE_URL
        sync: false
      - key: COMPILE_SERVICE_URL
        sync: false
      - key: AUDIT_SERVICE_URL
        sync: false
      - key: TOOLS_BASE_URL
        sync: false
      - key: VECTORDB_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AGENT_SESSION_PAYLOAD_KEY
        sync: false
      # REGISTRIES_PATH: omit to use orchestrator default (Path from __file__ to infra/registries)
      - key: CREDITS_ENABLED
        value: "true"
      - key: OPENSANDBOX_ENABLED
        value: "true"
      - key: OPENSANDBOX_API_URL
        sync: false
      - key: OPENSANDBOX_API_KEY
        sync: false
      - key: PASHOV_AUDIT_ENABLED
        sync: false
      - key: PASHOV_SKILLS_PATH
        sync: false
      # SCRUBD: mandatory RE/UX validation (clone at build/runtime)
      - key: SCRUBD_PATH
        sync: false
      - key: SCRUBD_VERSION
        sync: false
      - key: MAX_DEBATE_ROUNDS
        sync: false
      - key: VERCEL_SANDBOX_TOKEN
        sync: false
      - key: VERCEL_TEAM_ID
        sync: false
      - key: VERCEL_PROJECT_ID
        sync: false
      - key: DEMO_SANDBOX_SOURCE_URL
        sync: false
      - key: DEMO_SANDBOX_SOURCE_TYPE
        sync: false

  - type: web
    name: hyperagent-agent-runtime
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter hyperagent-agent-runtime... build
    startCommand: cd services/agent-runtime && node build/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUDIT_SERVICE_URL
        sync: false
      - key: COMPILE_SERVICE_URL
        sync: false
      - key: CHAIN_REGISTRY_PATH
        value: ../../infra/registries/network/chains.yaml
      - key: CORS_ORIGINS
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AGENT_SESSION_PAYLOAD_KEY
        sync: false
      - key: TENDERLY_API_KEY
        sync: false
      - key: TENDERLY_ACCOUNT
        sync: false
      - key: TENDERLY_PROJECT
        sync: false
      - key: TENDERLY_API_URL
        sync: false
      - key: PINATA_JWT
        sync: false

  - type: web
    name: hyperagent-compile
    runtime: python
    plan: free
    buildCommand: cd services/compile && pip install -r requirements.txt
    startCommand: cd services/compile && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    envVars:
      - key: COMPILE_MODE
        value: lite
      - key: TOOLS_BASE_URL
        sync: false
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-audit
    runtime: python
    plan: free
    buildCommand: cd services/audit && pip install -r requirements.txt
    startCommand: cd services/audit && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    envVars:
      - key: AUDIT_MODE
        value: mythx
      - key: TOOLS_BASE_URL
        sync: false
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-tools
    runtime: python
    plan: free
    buildCommand: cd services/hyperagent-tools && pip install -r requirements.txt && python -c "import solcx; solcx.install_solc('0.8.24')"
    startCommand: sh services/hyperagent-tools/start.sh
    healthCheckPath: /health
    envVars:
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-roma
    runtime: python
    plan: free
    buildCommand: cd services/roma-service && pip install -r requirements.txt
    startCommand: cd services/roma-service && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    envVars:
      - key: AGENT_RUNTIME_URL
        sync: false
      - key: ROMA_API_URL
        sync: false
      - key: ROMA_PROFILE
        value: general
      - key: ROMA_SPEC_TIMEOUT
        value: "120"
      - key: ROMA_MAX_DEPTH
        value: "1"

  - type: web
    name: hyperagent-vectordb
    runtime: python
    plan: free
    buildCommand: cd services/vectordb && pip install -r requirements.txt
    startCommand: cd services/vectordb && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    envVars:
      - key: QDRANT_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: hyperagent-gateway
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter hyperagent-api-gateway run build
    startCommand: cd apps/api-gateway && node build/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: ORCHESTRATOR_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_TLS_VERIFY
        sync: false
      - key: RATE_LIMIT_BYPASS_ON_FAIL
        sync: false
