# Render Blueprint. See docs/RENDER_FULL_STACK.md.
# Dashboard: https://dashboard.render.com/blueprint/new?repo=<REPO_HTTPS_URL>
# Blueprint Path: render.yaml (repo root). Link branch: main or feature/justinedevs.
#
# Architecture: Entire backend on Render. Production uses real services (no mocks).
# Set sync: false vars in Render Dashboard. A2A_* and REGISTRIES_PATH optional (defaults from erc8004.yaml).
#
# Build filters: each service auto-deploys only when its paths change. Changes to docs/, .github/,
# apps/studio, etc. do not trigger deploys. Add more paths if a service depends on shared packages.
#
# Build optimizations: pnpm --frozen-lockfile (deterministic, content-addressable store); pip --cache-dir
# for Python (reuse cache when Render preserves workspace between builds).
#
services:
  - type: web
    name: hyperagent-api
    runtime: python
    plan: free
    buildCommand: cd services/orchestrator && pip install --cache-dir .pip-cache -r requirements.txt && mkdir -p data && git clone --depth 1 --branch V6.0 https://github.com/sujeetc/SCRUBD data/SCRUBD
    startCommand: cd services/orchestrator && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    buildFilter:
      paths:
        - services/orchestrator/**
        - packages/**
        - infra/registries/**
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: THIRDWEB_CLIENT_ID
        sync: false
      - key: THIRDWEB_SECRET_KEY
        sync: false
      - key: THIRDWEB_SERVER_WALLET_ADDRESS
        sync: false
      - key: MERCHANT_WALLET_ADDRESS
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PASSWORD
        sync: false
      - key: X402_ENABLED
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: "production"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENABLE_METRICS
        value: "true"
      - key: ENABLE_WEBSOCKET
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      # ERC-8004 A2A identity: optional; when unset, uses infra/registries/erc8004/erc8004.yaml
      - key: A2A_DEFAULT_CHAIN_ID
        sync: false
      - key: A2A_AGENT_ID
        sync: false
      - key: REGISTRIES_PATH
        sync: false
      - key: AGENT_RUNTIME_URL
        fromService:
          name: hyperagent-agent-runtime
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: COMPILE_SERVICE_URL
        fromService:
          name: hyperagent-compile
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: AUDIT_SERVICE_URL
        fromService:
          name: hyperagent-audit
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ROMA_URL
        fromService:
          name: hyperagent-roma
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VECTORDB_URL
        fromService:
          name: hyperagent-vectordb
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: SIMULATION_SERVICE_URL
        fromService:
          name: hyperagent-agent-runtime
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DEPLOY_SERVICE_URL
        fromService:
          name: hyperagent-agent-runtime
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: STORAGE_SERVICE_URL
        fromService:
          name: hyperagent-agent-runtime
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: TOOLS_BASE_URL
        fromService:
          name: hyperagent-tools
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AGENT_SESSION_PAYLOAD_KEY
        sync: false
      # REGISTRIES_PATH: omit to use orchestrator default (Path from __file__ to infra/registries)
      - key: CREDITS_ENABLED
        value: "true"
      - key: OPENSANDBOX_ENABLED
        value: "true"
      - key: OPENSANDBOX_API_URL
        sync: false
      - key: OPENSANDBOX_API_KEY
        sync: false
      - key: PASHOV_AUDIT_ENABLED
        sync: false
      - key: PASHOV_SKILLS_PATH
        sync: false
      # SCRUBD: cloned at build; path relative to services/orchestrator
      - key: SCRUBD_PATH
        value: ./data/SCRUBD
      - key: SCRUBD_VERSION
        value: V6.0
      - key: MAX_DEBATE_ROUNDS
        sync: false
      - key: VERCEL_SANDBOX_TOKEN
        sync: false
      - key: VERCEL_TEAM_ID
        sync: false
      - key: VERCEL_PROJECT_ID
        sync: false
      - key: DEMO_SANDBOX_SOURCE_URL
        sync: false
      - key: DEMO_SANDBOX_SOURCE_TYPE
        sync: false

  - type: web
    name: hyperagent-agent-runtime
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter hyperagent-agent-runtime... build
    startCommand: cd services/agent-runtime && node build/index.js
    healthCheckPath: /health
    buildFilter:
      paths:
        - services/agent-runtime/**
        - packages/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUDIT_SERVICE_URL
        sync: false
      - key: COMPILE_SERVICE_URL
        sync: false
      - key: CHAIN_REGISTRY_PATH
        value: ../../infra/registries/network/chains.yaml
      - key: CORS_ORIGINS
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AGENT_SESSION_PAYLOAD_KEY
        sync: false
      - key: TENDERLY_API_KEY
        sync: false
      - key: TENDERLY_ACCOUNT
        sync: false
      - key: TENDERLY_PROJECT
        sync: false
      - key: TENDERLY_API_URL
        sync: false
      - key: PINATA_JWT
        sync: false

  - type: web
    name: hyperagent-compile
    runtime: python
    plan: free
    buildCommand: cd services/compile && pip install --cache-dir .pip-cache -r requirements.txt
    startCommand: cd services/compile && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    buildFilter:
      paths:
        - services/compile/**
    envVars:
      - key: COMPILE_MODE
        value: lite
      - key: TOOLS_BASE_URL
        sync: false
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-audit
    runtime: python
    plan: free
    buildCommand: cd services/audit && pip install --cache-dir .pip-cache -r requirements.txt
    startCommand: cd services/audit && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    buildFilter:
      paths:
        - services/audit/**
    envVars:
      - key: AUDIT_MODE
        value: mythx
      - key: TOOLS_BASE_URL
        sync: false
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-tools
    runtime: python
    plan: free
    buildCommand: cd services/hyperagent-tools && pip install --cache-dir .pip-cache -r requirements.txt && python -c "import solcx; solcx.install_solc('0.8.24')"
    startCommand: sh services/hyperagent-tools/start.sh
    healthCheckPath: /health
    buildFilter:
      paths:
        - services/hyperagent-tools/**
    envVars:
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-roma
    runtime: python
    plan: free
    buildCommand: cd services/roma-service && pip install --cache-dir .pip-cache -r requirements.txt
    startCommand: cd services/roma-service && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    buildFilter:
      paths:
        - services/roma-service/**
    envVars:
      - key: AGENT_RUNTIME_URL
        sync: false
      - key: ROMA_API_URL
        sync: false
      - key: ROMA_PROFILE
        value: general
      - key: ROMA_SPEC_TIMEOUT
        value: "120"
      - key: ROMA_MAX_DEPTH
        value: "1"

  - type: web
    name: hyperagent-vectordb
    runtime: python
    plan: free
    buildCommand: cd services/vectordb && pip install --cache-dir .pip-cache -r requirements.txt
    startCommand: cd services/vectordb && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    buildFilter:
      paths:
        - services/vectordb/**
    envVars:
      - key: QDRANT_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: hyperagent-gateway
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter hyperagent-api-gateway run build
    startCommand: cd apps/api-gateway && node build/index.js
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/api-gateway/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: ORCHESTRATOR_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_TLS_VERIFY
        sync: false
      - key: RATE_LIMIT_BYPASS_ON_FAIL
        sync: false
      - key: RATE_LIMIT_MAX_IP
        sync: false
      - key: RATE_LIMIT_MAX_USER
        sync: false
