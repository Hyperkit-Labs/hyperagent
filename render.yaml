# Render Blueprint. See docs/RENDER_FULL_STACK.md.
# Dashboard: https://dashboard.render.com/blueprint/new?repo=<REPO_HTTPS_URL>
# Blueprint Path: render.yaml (repo root). Link branch: main or feature/justinedevs.
#
# Architecture: Entire backend on Render. Local runs only frontend (Studio).
#
services:
  - type: web
    name: hyperagent-api
    runtime: python
    plan: free
    buildCommand: cd services/orchestrator && pip install -r requirements.txt
    startCommand: cd services/orchestrator && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: THIRDWEB_CLIENT_ID
        sync: false
      - key: THIRDWEB_SECRET_KEY
        sync: false
      - key: THIRDWEB_SERVER_WALLET_ADDRESS
        sync: false
      - key: MERCHANT_WALLET_ADDRESS
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PASSWORD
        sync: false
      - key: X402_ENABLED
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: "production"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ENABLE_METRICS
        value: "true"
      - key: ENABLE_WEBSOCKET
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: A2A_DEFAULT_CHAIN_ID
        sync: false
      - key: A2A_AGENT_ID
        sync: false
      - key: AGENT_RUNTIME_URL
        sync: false
      - key: COMPILE_SERVICE_URL
        sync: false
      - key: AUDIT_SERVICE_URL
        sync: false
      - key: TOOLS_BASE_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AGENT_SESSION_PAYLOAD_KEY
        sync: false

  - type: web
    name: hyperagent-agent-runtime
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter hyperagent-agent-runtime... build
    startCommand: cd services/agent-runtime && node build/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUDIT_SERVICE_URL
        sync: false
      - key: COMPILE_SERVICE_URL
        sync: false
      - key: CHAIN_REGISTRY_PATH
        value: ../../infra/registries/network/chains.yaml
      - key: CORS_ORIGINS
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AGENT_SESSION_PAYLOAD_KEY
        sync: false
      - key: PINATA_JWT
        sync: false

  - type: web
    name: hyperagent-compile
    runtime: python
    plan: free
    buildCommand: cd services/compile && pip install -r requirements.txt
    startCommand: cd services/compile && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    envVars:
      - key: COMPILE_MODE
        value: lite
      - key: TOOLS_BASE_URL
        sync: false
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-audit
    runtime: python
    plan: free
    buildCommand: cd services/audit && pip install -r requirements.txt
    startCommand: cd services/audit && uvicorn main:app --host 0.0.0.0 --port ${PORT:-9000}
    healthCheckPath: /health
    envVars:
      - key: AUDIT_MODE
        value: mythx
      - key: TOOLS_BASE_URL
        sync: false
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-tools
    runtime: python
    plan: free
    buildCommand: cd services/hyperagent-tools && pip install -r requirements.txt && python -c "import solcx; solcx.install_solc('0.8.24')"
    startCommand: sh services/hyperagent-tools/start.sh
    healthCheckPath: /health
    envVars:
      - key: TOOLS_API_KEY
        sync: false

  - type: web
    name: hyperagent-gateway
    runtime: node
    plan: free
    buildCommand: cd apps/api-gateway && npm install && npm run build
    startCommand: cd apps/api-gateway && node build/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: ORCHESTRATOR_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: REDIS_URL
        sync: false
